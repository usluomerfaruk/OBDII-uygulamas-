name: obd_app
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.66.2  
  
  # Izinleri kolay yönetmek için gerekli paket
  permission_handler: ^11.1.0 
  
  # Classic Bluetooth ELM327 için kullanılan paket (UUID zorlaması için 0.4.1 kullanıyoruz)
  flutter_bluetooth_serial: ^0.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Resim veya font eklemek isterseniz burayı kullanabilirsiniz
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg